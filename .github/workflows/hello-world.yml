name: Hello World Sanity Check

on:
  push:
    branches: [ main ]

jobs:
  say-hello:
    # This targets your b105 node instead of GitHub's cloud
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Print a Welcome Message
        run: |
          echo "Hello, World!"
          echo "Executing directly on node:"
          hostname

      - name: Inspect Environment Variables
        run: |
          echo "Current execution branch: $GITHUB_REF"
          echo "Working directory path: $GITHUB_WORKSPACE"

name: Hello World Sanity Check

on:
  push:
    branches: [ main ]

jobs:
  say-hello:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Dispatch Execution to Node b105
        run: |
          echo "Runner is active on the login node. Dispatching command to b105..."
          
          # Added --time=00:05:00 to satisfy COSMA's strict allocation rules
          srun -p bluefield1 -A do009 --time=00:05:00 --nodelist=b105 bash -c '
            echo "Hello from the compute node!"
            echo "My hostname is: $(hostname)"
            echo "My working directory is: $(pwd)"
          '

name: Hello World Sanity Check

on:
  push:
    branches: [ main ]

jobs:
  say-hello:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Dispatch Execution to Node b105
        run: |
          echo "Runner is active on the login node. Dispatching command to b105..."
          
          # Wrap the execution in srun to cross the network bridge to the compute node
          srun -p bluefield1 -A do009 --nodelist=b105 hostname
